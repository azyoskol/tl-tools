definitions:
  apperrors.AppError:
    properties:
      code:
        type: string
      detail:
        type: string
      status:
        type: integer
    type: object
  biz.WebhookRequest:
    properties:
      event_type:
        maxLength: 100
        type: string
      payload:
        additionalProperties: {}
        type: object
      source:
        enum:
        - git
        - pm
        - cicd
        - metrics
        type: string
      team_id:
        type: string
    required:
    - event_type
    - source
    type: object
  biz.WebhookResponse:
    properties:
      received:
        type: string
      status:
        type: string
    type: object
info:
  contact:
    name: Metraly
  description: Team Engineering Metrics API
  title: Metraly API
  version: "1.0"
paths:
  /api/v1/collectors:
    post:
      consumes:
      - application/json
      description: Receive events from external systems
      parameters:
      - description: Webhook request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/biz.WebhookRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/biz.WebhookResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apperrors.AppError'
      summary: Receive webhook event
      tags:
      - webhook
  /api/v1/dashboards:
    get:
      consumes:
      - application/json
      description: Returns list of all dashboards
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List dashboards
      tags:
      - dashboards
    post:
      consumes:
      - application/json
      description: Creates a new dashboard
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Create dashboard
      tags:
      - dashboards
  /api/v1/dora:
    get:
      consumes:
      - application/json
      description: Returns DORA metrics (deployment frequency, lead time, MTTR, change
        failure rate)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get DORA metrics
      tags:
      - dora
  /api/v1/health:
    get:
      consumes:
      - application/json
      description: Returns the health status of the API
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Health check
      tags:
      - health
  /api/v1/insights:
    get:
      consumes:
      - application/json
      description: Returns AI-generated insights for the team
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get insights
      tags:
      - insights
  /api/v1/metrics:
    get:
      consumes:
      - application/json
      description: Returns engineering metrics (PRs, tasks, CI/CD)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get engineering metrics
      tags:
      - metrics
  /api/v1/role/{role}:
    get:
      consumes:
      - application/json
      description: Returns dashboard data for a specific role (engineer, lead, manager)
      parameters:
      - description: Role name
        in: path
        name: role
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get role-specific dashboard
      tags:
      - role
swagger: "2.0"
