apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "team-dashboard.fullname" . }}-api
  labels:
    {{- include "team-dashboard.labels" . | nindent 4 }}
    component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "team-dashboard.selectorLabels" . | nindent 6 }}
      component: api
  template:
    metadata:
      labels:
        {{- include "team-dashboard.selectorLabels" . | nindent 8 }}
        component: api
    spec:
      containers:
        - name: api
          image: {{ .Values.api.image }}:{{ .Chart.AppVersion }}
          ports:
            - containerPort: 8000
          env:
            - name: CLICKHOUSE_HOST
              value: {{ include "team-dashboard.fullname" . }}-clickhouse
            - name: CLICKHOUSE_PORT
              value: "9000"
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "team-dashboard.fullname" . }}-api
spec:
  selector:
    component: api
  ports:
    - port: 8000
      targetPort: 8000