replicaCount: 1

image:
  pullPolicy: IfNotPresent

api:
  image: team-dashboard/api
  service:
    type: ClusterIP
    port: 8000
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

ui:
  image: team-dashboard/ui
  service:
    type: ClusterIP
    port: 80
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

collectors:
  git:
    image: team-dashboard/collector-git
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
  pm:
    image: team-dashboard/collector-pm
  cicd:
    image: team-dashboard/collector-cicd
  metrics:
    image: team-dashboard/collector-metrics

clickhouse:
  image: clickhouse/clickhouse-server:23.8
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  storage: 10Gi

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: dashboard.example.com
      paths:
        - path: /
          pathType: Prefix
          service: ui
        - path: /api
          pathType: Prefix
          service: api
  tls:
    - secretName: team-dashboard-tls
      hosts:
        - dashboard.example.com