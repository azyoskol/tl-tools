services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - metraly

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: metraly
      POSTGRES_PASSWORD: metraly
      POSTGRES_DB: metraly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metraly -d metraly"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - metraly

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DSN: postgres://metraly:metraly@postgres:5432/metraly?sslmode=disable
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - metraly

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "${UI_PORT:-3000}:80"
    depends_on:
      - api
    networks:
      - metraly

volumes:
  redis_data:
  postgres_data:

networks:
  metraly:
    driver: bridge
