services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: default
    volumes:
      - ./clickhouse/init:/docker-entrypoint-initdb.d
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - metraly-api:build-cache
    ports:
      - "8000:8000"
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_started

  ui:
    build:
      context: ./ui
      cache_from:
        - metraly-ui:build-cache
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  clickhouse_data:
  redis_data: