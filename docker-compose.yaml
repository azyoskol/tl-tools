version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: default
    volumes:
      - ./clickhouse/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
    depends_on:
      clickhouse:
        condition: service_healthy

  ui:
    build: ./ui
    ports:
      - "3000:80"
    depends_on:
      - api

  collector-git:
    build: ./collectors/git
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
    depends_on:
      clickhouse:
        condition: service_healthy

  collector-pm:
    build: ./collectors/pm
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
    depends_on:
      clickhouse:
        condition: service_healthy

  collector-cicd:
    build: ./collectors/cicd
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
    depends_on:
      clickhouse:
        condition: service_healthy

  collector-metrics:
    build: ./collectors/metrics
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
    depends_on:
      clickhouse:
        condition: service_healthy

volumes:
  clickhouse_data: