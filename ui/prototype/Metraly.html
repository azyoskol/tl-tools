<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0B0F19;
  --glass:     #131825;
  --glass2:    #1a2235;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);
  --cyan:      #00E5FF;
  --purple:    #B44CFF;
  --success:   #00C853;
  --warning:   #FF9100;
  --error:     #FF1744;
  --text:      #E8EDF5;
  --muted:     #6B7A9A;
  --muted2:    #9BAABF;
  --grad:      linear-gradient(135deg, #00E5FF, #B44CFF);
  --font-head: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --sidebar-w: 228px;
}

html, body, #root {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

/* Glass utility */
.glass {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 12px;
  backdrop-filter: blur(16px);
}

/* Animations */
@keyframes pulse-dot {
  0%, 100% { box-shadow: 0 0 0 0 rgba(0,229,255,0.4); opacity: 1; }
  50% { box-shadow: 0 0 0 6px rgba(0,229,255,0); opacity: 0.7; }
}
@keyframes fade-up {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes shimmer {
  from { background-position: -200% center; }
  to   { background-position: 200% center; }
}
@keyframes spin-slow { to { transform: rotate(360deg); } }
@keyframes bar-grow {
  from { transform: scaleY(0); }
  to   { transform: scaleY(1); }
}

.fade-up { animation: fade-up 0.35s ease both; }
.fade-up-1 { animation: fade-up 0.35s 0.06s ease both; }
.fade-up-2 { animation: fade-up 0.35s 0.12s ease both; }
.fade-up-3 { animation: fade-up 0.35s 0.18s ease both; }
.fade-up-4 { animation: fade-up 0.35s 0.24s ease both; }
.fade-up-5 { animation: fade-up 0.35s 0.30s ease both; }
.fade-up-6 { animation: fade-up 0.35s 0.36s ease both; }

/* Focus */
*:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; border-radius: 4px; }
</style>
</head>

// ─── Sparkline ────────────────────────────────────────────────────────────────
const Sparkline = ({ data, color = '#00E5FF', height = 36 }) => {
  const w = 80, h = height;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 4) - 2;
    return `${x},${y}`;
  }).join(' ');
  const area = `M0,${h} L${pts.split(' ').map(p => p).join(' L')} L${w},${h} Z`;
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{overflow:'visible'}}>
      <defs>
        <linearGradient id={`sg-${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#sg-${color.replace('#','')})`}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
};

    setPinned(prev => {

                <button key={item.id} onClick={() => onNav(item.id)}
                  style={{
                    width: '100%', display: 'flex', alignItems: 'center', gap: 9,
                    padding: '8px 10px', borderRadius: 8, border: 'none',
                    cursor: 'pointer', marginBottom: 2,
                    background: isActive ? 'rgba(0,229,255,0.1)' : item.accent ? 'rgba(0,229,255,0.06)' : 'transparent',

                    fontFamily: 'var(--font-body)', fontSize: 13.5, fontWeight: isActive || item.accent ? 500 : 400,
                    transition: 'all 0.18s ease', textAlign: 'left',
                    position: 'relative',
                    border: item.accent && !isActive ? '1px dashed rgba(0,229,255,0.2)' : 'none',

                  onMouseEnter={e => { setHoveredPin(item.id); if (!isActive) { e.currentTarget.style.background='rgba(0,229,255,0.1)'; e.currentTarget.style.color='var(--cyan)'; }}}

                >
                  {isActive && <div style={{
                    position: 'absolute', left: 0, top: '50%', transform: 'translateY(-50%)',
                    width: 3, height: 16, borderRadius: 2, background: 'var(--cyan)',
                  }}/>}
                  <Icon name={item.icon} size={15} color={isActive ? 'var(--cyan)' : 'currentColor'}/>

                  {sec.label === 'Dashboards' && item.id !== 'dash-wizard' && hoveredPin === item.id && (

// ─── Metric Card ─────────────────────────────────────────────────────────────
const MetricCard = ({ icon, label, value, trend, trendDir, sparkData, accentColor, delay = 0 }) => {
  const [hovered, setHovered] = React.useState(false);
  const cls = ['fade-up-1','fade-up-2','fade-up-3','fade-up-4'][delay] || 'fade-up';
  return (
    <div className={cls}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        background: hovered ? 'var(--glass2)' : 'var(--glass)',
        border: `1px solid ${hovered ? 'rgba(255,255,255,0.12)' : 'var(--border)'}`,
        borderRadius: 14, padding: '20px 20px 16px',
        display: 'flex', flexDirection: 'column', gap: 14,
        cursor: 'default', transition: 'all 0.2s ease',
        boxShadow: hovered ? `0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06)` : 'none',
        transform: hovered ? 'translateY(-2px)' : 'none',
      }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
        <div style={{
          width: 36, height: 36, borderRadius: 10,
          background: `${accentColor}18`,
          border: `1px solid ${accentColor}30`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <Icon name={icon} size={16} color={accentColor}/>
        </div>
        <div style={{
          fontSize: 11, fontFamily: 'var(--font-mono)',
          color: trendDir === 'up' ? 'var(--success)' : trendDir === 'down' ? 'var(--error)' : 'var(--muted)',
          background: trendDir === 'up' ? 'rgba(0,200,83,0.1)' : trendDir === 'down' ? 'rgba(255,23,68,0.1)' : 'rgba(107,122,154,0.15)',
          border: `1px solid ${trendDir === 'up' ? 'rgba(0,200,83,0.2)' : trendDir === 'down' ? 'rgba(255,23,68,0.2)' : 'rgba(107,122,154,0.2)'}`,
          borderRadius: 6, padding: '2px 7px',
        }}>{trend}</div>
      </div>
      <div>
        <div style={{ fontFamily: 'var(--font-head)', fontSize: 32, fontWeight: 700, color: 'var(--text)', lineHeight: 1 }}>{value}</div>
        <div style={{ fontSize: 12.5, color: 'var(--muted)', marginTop: 5 }}>{label}</div>
      </div>
      <div style={{ marginTop: 'auto' }}>
        <Sparkline data={sparkData} color={accentColor}/>
      </div>
    </div>
  );
};

          {step === 3 && (
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:20, padding:'20px 0' }}>
              <div style={{ width:64, height:64, borderRadius:20, background:'rgba(0,200,83,0.12)', border:'1px solid rgba(0,200,83,0.25)', display:'flex', alignItems:'center', justifyContent:'center' }}>
                <Icon name="check" size={28} color="var(--success)"/>
              </div>
              <div style={{ textAlign:'center' }}>
                <div style={{ fontFamily:'var(--font-head)', fontWeight:700, fontSize:18, color:'var(--text)', marginBottom:6 }}>You're all set</div>
                <div style={{ fontSize:13, color:'var(--muted)', maxWidth:380 }}>
                  Metraly will begin indexing your GitHub repositories. First metrics appear in ~2 minutes.
                </div>
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:8, width:'100%', maxWidth:340 }}>
                {selected.map(id => {
                  const src = sources.find(s=>s.id===id);
                  return src ? (
                    <div key={id} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 14px', background:'rgba(0,200,83,0.06)', border:'1px solid rgba(0,200,83,0.15)', borderRadius:10 }}>
                      <Icon name={src.icon} size={15} color={src.color}/>
                      <span style={{ fontSize:13, color:'var(--text)' }}>{src.name}</span>
                      <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:5 }}>
                        <div style={{ width:6, height:6, borderRadius:'50%', background:'var(--success)', animation:'pulse-dot 2s infinite' }}/>
                        <span style={{ fontSize:11, color:'var(--success)', fontFamily:'var(--font-mono)' }}>Connecting</span>
                      </div>
                    </div>
                  ) : null;
                })}
              </div>
            </div>
          )}
        </div>

        {/* Footer actions */}
        <div style={{ padding:'16px 28px', borderTop:'1px solid var(--border)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <button onClick={() => setStep(s => Math.max(0, s-1))} style={{
            padding:'8px 18px', borderRadius:9, cursor: step===0 ? 'default':'pointer',
            background:'transparent', border:'1px solid var(--border)',
            color: step===0 ? 'var(--muted)' : 'var(--text)', fontSize:13, fontFamily:'var(--font-body)',
            opacity: step===0 ? 0.4 : 1, transition:'all 0.15s',
          }}>Back</button>
          <button onClick={() => setStep(s => Math.min(steps.length-1, s+1))} style={{
            padding:'8px 22px', borderRadius:9, cursor:'pointer',
            background: step===steps.length-1 ? 'var(--success)' : 'var(--grad)',
            border:'none', color:'#fff', fontSize:13.5, fontWeight:600, fontFamily:'var(--font-body)',
            transition:'all 0.15s', boxShadow: step===steps.length-1 ? '0 0 16px rgba(0,200,83,0.3)' : '0 0 16px rgba(0,229,255,0.2)',
          }}>
            {step === steps.length-1 ? 'Go to Dashboard' : 'Continue →'}
          </button>
        </div>
      </div>
    </div>
  );
};

      {/* Grid */}

              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:'auto' }}>
                <div style={{ display:'flex', alignItems:'center', gap:5 }}>
                  <Icon name="star" size={12} color="#FFD600" style={{ fill:'#FFD600' }}/>
                  <span style={{ fontSize:12, color:'var(--muted2)', fontFamily:'var(--font-mono)' }}>{p.rating}</span>
                  <span style={{ fontSize:11, color:'var(--muted)' }}>· {p.installs}</span>
                </div>
                <button style={{
                  padding:'6px 14px', borderRadius:8, cursor:'pointer', fontSize:12, fontWeight:500,
                  fontFamily:'var(--font-body)', transition:'all 0.15s',
                  background: p.installed ? 'transparent' : 'rgba(0,229,255,0.1)',
                  border: p.installed ? '1px solid var(--border)' : '1px solid rgba(0,229,255,0.25)',

// ─── AI Insights Full Screen ──────────────────────────────────────────────────
const AIScreen = () => {
  const [input, setInput] = React.useState('');
  const [messages, setMessages] = React.useState([
    { role:'assistant', text:"Hi! I'm your Metraly AI assistant. Ask me anything about your engineering metrics, build trends, team health, or deployment patterns." },
    { role:'user', text:'Why did CI time increase this week?' },
    { role:'assistant', text:"Good question. Over the past 7 days, median CI time rose from 3m 41s to 4m 22s — a 19% increase.\n\nThe primary driver appears to be a 34% increase in test suite duration on the api-gateway service, starting Tuesday after commit d7a21f. That commit added 143 new integration tests.\n\nSecondary factor: Docker layer cache hit rate dropped from 91% to 67% on monorepo builds, likely due to a base image update." },
  ]);

  const send = async () => {
    if (!input.trim()) return;
    const userMsg = input;
    setInput('');
    setMessages(prev => [...prev, { role:'user', text:userMsg }]);
    try {
      const reply = await window.claude.complete(`You are an engineering intelligence AI for a platform called Metraly. Answer concisely and technically. User question: ${userMsg}`);
      setMessages(prev => [...prev, { role:'assistant', text: reply }]);
    } catch {
      setMessages(prev => [...prev, { role:'assistant', text:'(AI unavailable in preview — responses are simulated)' }]);
    }
  };

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <div style={{ flex:1, overflow:'auto', padding:'20px 28px', display:'flex', flexDirection:'column', gap:14 }}>
        {messages.map((m, i) => (
          <div key={i} style={{ display:'flex', gap:12, alignItems:'flex-start', animation:'fade-up 0.3s ease both', animationDelay:`${i*0.05}s` }}>
            <div style={{
              width:28, height:28, borderRadius:8, flexShrink:0,
              background: m.role==='assistant' ? 'linear-gradient(135deg, rgba(0,229,255,0.2), rgba(180,76,255,0.2))' : 'rgba(255,255,255,0.06)',
              border: m.role==='assistant' ? '1px solid rgba(180,76,255,0.3)' : '1px solid var(--border)',
              display:'flex', alignItems:'center', justifyContent:'center',
              marginTop:2,
            }}>
              {m.role==='assistant' ? <Icon name="sparkles" size={13} color="var(--purple)"/> : <span style={{fontSize:11, fontWeight:700, color:'var(--muted)'}}>JD</span>}
            </div>
            <div style={{
              flex:1, background: m.role==='assistant' ? 'var(--glass)' : 'rgba(255,255,255,0.04)',
              border:'1px solid var(--border)', borderRadius:12, padding:'12px 15px',
              fontSize:13.5, color:'var(--text)', lineHeight:1.65,
              whiteSpace:'pre-wrap',
              borderTopLeftRadius: m.role==='assistant' ? 3 : 12,
              borderTopRightRadius: m.role==='user' ? 3 : 12,
            }}>{m.text}</div>
          </div>
        ))}
      </div>
      {/* Input */}
      <div style={{ padding:'14px 28px', borderTop:'1px solid var(--border)', background:'rgba(11,15,25,0.7)' }}>
        <div style={{
          display:'flex', gap:10, alignItems:'flex-end',
          background:'var(--glass)', border:'1px solid var(--border)',
          borderRadius:12, padding:'10px 14px',
        }}>
          <div style={{ position:'relative', flexShrink:0, marginTop:1 }}>
            <Icon name="sparkles" size={15} color="var(--purple)"/>
            <div style={{ position:'absolute', top:-3, right:-3, width:7, height:7, borderRadius:'50%', background:'var(--cyan)', border:'1.5px solid var(--bg)', animation:'pulse-dot 2s infinite' }}/>
          </div>
          <input value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&(e.preventDefault(),send())}
            placeholder="Ask about your engineering metrics…"
            style={{ flex:1, background:'none', border:'none', outline:'none', color:'var(--text)', fontSize:13.5, fontFamily:'var(--font-body)', resize:'none' }}/>
          <button onClick={send} style={{
            padding:'6px 14px', borderRadius:8, cursor:'pointer',
            background:'var(--grad)', border:'none', color:'#fff', fontSize:12.5, fontWeight:600,
          }}>Send</button>
        </div>
        <div style={{ textAlign:'center', marginTop:8, fontSize:11, color:'var(--muted)' }}>
          Powered by your private on-premise AI · No data leaves your infra
        </div>
      </div>
    </div>
  );
};

// ─── App Shell ────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#00E5FF",
  "sidebarCollapsed": false,
  "density": "comfortable",
  "showSparklines": true
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [active, setActive] = React.useState('dashboard');

  const titles = {
    dashboard:    ['Overview',          'Last updated 2 min ago'],
    'dash-cto':   ['CTO Dashboard',     'Strategic health, DORA trends, team velocity'],
    'dash-vp':    ['VP Engineering',    'Delivery health & team performance'],
    'dash-tl':    ['Tech Lead',         'CI health, PR queue & sprint progress'],
    'dash-devops':['DevOps / SRE',      'Deploy frequency, MTTR & incidents'],
    'dash-ic':    ['My Dashboard',      'Personal metrics & sprint tasks'],
    'dash-wizard':['New Dashboard',     'Build a custom dashboard'],
    metrics:      ['Metrics Explorer',  'DORA, CI/CD, PR & custom metrics'],
    ai:           ['AI Assistant',      'Private · On-premise inference'],
    plugins:      ['Plugin Marketplace','Browse & install integrations'],
    wizard:       ['Connect Sources',   'Onboarding wizard'],
    settings:     ['Settings',          'Platform configuration'],
  };
  const [title, subtitle] = titles[active] || ['Metraly', ''];

  const renderScreen = () => {
    switch(active) {
      case 'dashboard':   return <DashboardScreen/>;
      case 'dash-cto':    return React.createElement(window.RoleDashboardScreen, { initialRole: 'cto',    onNewDashboard: () => setActive('dash-wizard') });
      case 'dash-vp':     return React.createElement(window.RoleDashboardScreen, { initialRole: 'vp',     onNewDashboard: () => setActive('dash-wizard') });
      case 'dash-tl':     return React.createElement(window.RoleDashboardScreen, { initialRole: 'tl',     onNewDashboard: () => setActive('dash-wizard') });
      case 'dash-devops': return React.createElement(window.RoleDashboardScreen, { initialRole: 'devops', onNewDashboard: () => setActive('dash-wizard') });
      case 'dash-ic':     return React.createElement(window.RoleDashboardScreen, { initialRole: 'ic',     onNewDashboard: () => setActive('dash-wizard') });
      case 'dash-wizard': return React.createElement(window.DashboardWizardScreen, { onSave: () => setActive('dashboard'), onCancel: () => setActive('dashboard') });
      case 'metrics':     return React.createElement(window.MetricsScreen);
      case 'ai':          return <AIScreen/>;
      case 'plugins':     return <PluginScreen/>;
      case 'wizard':      return <WizardScreen/>;
      default:            return <PlaceholderScreen name={title}/>;
    }
  };

  return (
    <div style={{ display:'flex', height:'100%', width:'100%', overflow:'hidden' }}>
      <Sidebar active={active} onNav={setActive}/>
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minWidth:0 }}>
        <Topbar title={title} subtitle={subtitle}/>
        {renderScreen()}
      </div>
      <TweaksPanel>
        <TweakSection title="Theme">
          <TweakColor id="accentColor" label="Accent color" value={tweaks.accentColor} onChange={v=>setTweak('accentColor',v)}/>
          <TweakRadio id="density" label="Density" value={tweaks.density} options={['compact','comfortable','spacious']} onChange={v=>setTweak('density',v)}/>
        </TweakSection>
        <TweakSection title="Display">
          <TweakToggle id="showSparklines" label="Show sparklines" value={tweaks.showSparklines} onChange={v=>setTweak('showSparklines',v)}/>
          <TweakToggle id="sidebarCollapsed" label="Collapse sidebar" value={tweaks.sidebarCollapsed} onChange={v=>setTweak('sidebarCollapsed',v)}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
