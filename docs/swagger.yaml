basePath: /
definitions:
  apperrors.AppError:
    properties:
      code:
        type: string
      detail:
        type: string
      status:
        type: integer
    type: object
  biz.WebhookRequest:
    properties:
      event_type:
        maxLength: 100
        type: string
      payload:
        additionalProperties: {}
        type: object
      source:
        enum:
        - git
        - pm
        - cicd
        - metrics
        type: string
      team_id:
        type: string
    required:
    - event_type
    - source
    type: object
  biz.WebhookResponse:
    properties:
      received:
        type: string
      status:
        type: string
    type: object
info:
  contact:
    name: Metraly
  description: Team Engineering Metrics API
  license:
    name: MIT
  title: Metraly API
  version: 1.0.0
paths:
  /api/v1/collectors:
    post:
      consumes:
      - application/json
      description: Receive events from external systems
      parameters:
      - description: Webhook request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/biz.WebhookRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/biz.WebhookResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apperrors.AppError'
      summary: Receive webhook event
      tags:
      - webhook
swagger: "2.0"
