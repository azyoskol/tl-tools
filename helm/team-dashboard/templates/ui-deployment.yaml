apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "team-dashboard.fullname" . }}-ui
  labels:
    {{- include "team-dashboard.labels" . | nindent 4 }}
    component: ui
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "team-dashboard.selectorLabels" . | nindent 6 }}
      component: ui
  template:
    metadata:
      labels:
        {{- include "team-dashboard.selectorLabels" . | nindent 8 }}
        component: ui
    spec:
      containers:
        - name: ui
          image: {{ .Values.ui.image }}:{{ .Chart.AppVersion }}
          ports:
            - containerPort: 80
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "team-dashboard.fullname" . }}-ui
spec:
  selector:
    component: ui
  ports:
    - port: 80
      targetPort: 80